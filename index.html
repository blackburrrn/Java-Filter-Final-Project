<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Filter Final Project</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/07d29e597a.js" crossorigin="anonymous"></script>
    <script src="app.js" defer></script>
</head>

<header>
    <section class="landing">
        <div class="header">
            <div class="row nav__row">
                <div class="logo__wrapper">
                    <img class="avengers__logo" src="./Assets/avengers__logo.png" alt="Avengers Logo">
                </div>
                <div class="nav__links">
                    <a href="#">Home</a>
                    <a href="#">Find Your Car</a>
                    <a href="#">Contact</a>
                </div>
            </div>
        </div>
</header>
<body>
        <div class="row landing__row">
            <div class="landing__content">
                <h1>Find Your Dream Car</h1>
                <div class="search__wrapper">
                <input class="search__input" type="text" placeholder="Search for your car...">
                <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>
        </div>
    </section>
    <section class="search__results">
            <div class="row search__results--row">
                <div class="search__filter">
                <h2>Search Results</h2>
                    <div class="filer__wrapper">
                        <select name="Filter" id="filter">
                            <option value disabled selected>Filter</option>
                            <option value="price-low">Title: A - Z</option>
                            <option value="price-high">Title: Z - A</option>
                            <option value="year-new">Year: Newest First</option>
                            <option value="year-old">Year: Oldest First</option>
                        </select>
                    </div>
                </div>
                    <div class="results__wrapper">
                        <div class="result__card">
                            <img src="" alt="">
                            <h3>Title 1</h3>
                            <p>Year</p>
                            <img src="" alt="">
                        </div>

                        <div class="result__card">

                            <img src="" alt="">
                        </div>
                        <div class="result__card">
                            <img src="" alt="">
                            <h3>Title 1</h3>
                            <p>Year</p>
                            <img src="" alt="">
                        </div>
                        <div class="result__card">
                            <img src="" alt="">
                            <h3>Title 1</h3>
                            <p>Year</p>
                            <img src="" alt="">
                        </div>
                        
                    </div>
            </div>
        </section>
        <section class="footer">
            <p class="footer__copyright">© 2026 Java Filter Final Project. Jonathan Blackburn.</p>
        </section>
    

</body>
</html>
