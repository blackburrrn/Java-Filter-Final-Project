<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Filter Final Project</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/07d29e597a.js" crossorigin="anonymous"></script>
    <script src="app.js" defer></script>
</head>

<header>
    <section class="landing">
        <div class="header">
            <div class="row nav__row">
                <div class="nav__links">
                    <a href="#">Home</a>
                    <a href="#">Find Movie</a>
                    <a href="#">Contact</a>
                </div>
            </div>
        </div>
        <div class="row landing__row">
            <div class="landing__content">
                <h1>Assemble Your Movie Night</h1>
                <div class="search__wrapper">
                <input class="search__input" type="text" placeholder="Search for your movie...">
                <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>
        </div>
    </section>
</header>
<body>
    <section class="search__results">
            <div class="row search__results--row">
                <div class="search__filter">
                <h2>Search Results</h2>
                    <div class="filer__wrapper">
                        <select id="filter" onchange="filterMovies(event)">
                            <option value disabled selected>Filter</option>
                            <option value="a_to_z">Title: A - Z</option>
                            <option value="z_to_a">Title: Z - A</option>
                            <option value="new_to_old">Year: Newest First</option>
                            <option value="old_to_new">Year: Oldest First</option>
                        </select>
                    </div>
                </div>
                    <div class="movies__wrapper">
                        <div class="movie__card--wrapper">
                        <div class="movie__card">
                            <img class="movie__poster" src="" alt="">
                            <h3>Title 1</h3>
                            <p>Year</p>
                        </div>
                        </div>
                        <div class="movie__card--wrapper">
                        <div class="movie__card">
                            <img class="movie__poster" src="" alt="">

                        </div>
                        </div>
                        <div class="movie__card--wrapper">
                        <div class="movie__card">
                            <img class="movie__poster" src="" alt="">
                            <h3>Title 1</h3>
                            <p>Year</p>
                        </div>
                        </div>
                        <div class="movie__card--wrapper">
                        <div class="movie__card">
                            <img class="movie__poster" src="" alt="">
                            <h3>Title 1</h3>
                            <p>Year</p>
                        </div>
                        </div>
                        <div class="movie__card--wrapper">
                        <div class="movie__card">
                            <img class="movie__poster" src="" alt="">
                            <h3>Title 1</h3>
                            <p>Year</p>
                        </div>  
                        </div>
                    </div>
            </div>
        </section>
</body>
<footer>
    <section class="footer">
        <p class="footer__copyright">© 2026 Java Filter Final Project. Jonathan Blackburn.</p>
    </section>
</footer>
